edition = 4

[agent]
capabilities = ["resources"]
name = "resource-expansion-spike"
version = "0.0.1"
summary = "Spike: does Coral server auto-expand <resource/> tags?"
description = "Throwaway atom that reads resources, logs the received systemPrompt verbatim, and exits."
readme = "# resource-expansion-spike\n\nThrowaway — confirms whether Coral server expands `<resource/>` tags in system prompts or delivers them verbatim."

[agent.license]
type = "text"
text = "MIT"

[runtimes.executable]
transport = "streamable_http"
path = "npx"
arguments = ["--yes", "tsx", "index.ts"]

[options]
SYSTEM_PROMPT = { type = "string", default = """
You are a spike agent. Log only.
<resource>coral://instruction</resource>
<resource uri="coral://state"/>
""", display.multiline = true, display.description = "Mixed tag+attr forms to cover both documented conventions" }

MODEL_API_KEY = { type = "string", required = false, secret = true, display.description = "Unused in spike; declared to satisfy template runtime if reused" }
